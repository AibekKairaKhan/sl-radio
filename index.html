<!DOCTYPE html>
<html>
<head>
    <title>SL Radio Bridge (Ad-Free)</title>
    <style>
        body { margin: 0; background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #status { font-size: 24px; font-weight: bold; cursor: pointer; padding: 20px; border: 2px solid #fff; border-radius: 10px; background: #333; text-align: center; }
        iframe { display: none; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="status">RADIO OFF<br><span style="font-size:14px; font-weight:normal;">Click here to turn on the ignition</span></div>
    
    <iframe id="player" allow="autoplay"></iframe>

    <script>
        var currentVid = '';
        var statusDiv = document.getElementById('status');
        var iframe = document.getElementById('player');
        
        // This is a public, ad-free proxy server that pulls directly from YouTube
        var proxyBase = "https://vid.puffyan.us/embed/";

        // 1. Wait for the physical click on the dashboard
        statusDiv.addEventListener('click', function() {
            statusDiv.style.display = 'none';
            iframe.style.display = 'block';
            
            // Start checking for LSL commands
            checkHash();
            setInterval(checkHash, 1000);
        }, { once: true });

        // 2. The LSL Listener
        function checkHash() {
            var hash = window.location.hash.substring(1);
            if (hash && hash !== currentVid) {
                if (hash === "STOP") {
                    iframe.src = ""; // Kill the stream
                    currentVid = hash;
                } else {
                    currentVid = hash;
                    // Route the YouTube ID through the ad-free proxy
                    iframe.src = proxyBase + currentVid + "?autoplay=1";
                }
            }
        }
    </script>
</body>
</html>
