<!DOCTYPE html>
<html>
<head>
    <title>SL Radio Bridge</title>
    <style>
        body { margin: 0; background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #status { font-size: 24px; font-weight: bold; cursor: pointer; padding: 20px; border: 2px solid #fff; border-radius: 10px; background: #333; text-align: center; }
        iframe { display: none; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="status">RADIO OFF<br><span style="font-size:14px; font-weight:normal;">Click here to turn on the ignition</span></div>
    <div id="player"></div>

    <script>
        var player;
        var currentVid = '';
        var statusDiv = document.getElementById('status');

        // 1. Load the official YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 2. This runs when the API is ready
        function onYouTubeIframeAPIReady() {
            // We wait for the driver to click the prim face. This permanently unlocks the audio block!
            statusDiv.addEventListener('click', function() {
                statusDiv.innerHTML = "SYSTEM READY<br><span style='font-size:14px; font-weight:normal;'>Waiting for LSL to send a song...</span>";
                statusDiv.style.cursor = "default";
                
                player = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: '', // Starts empty
                    playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
                    events: { 'onReady': onPlayerReady }
                });
            }, { once: true });
        }

        function onPlayerReady(event) {
            statusDiv.style.display = 'none';
            document.querySelector('iframe').style.display = 'block';
            
            // Start checking for silent messages from LSL
            checkHash(); 
            setInterval(checkHash, 1000); 
        }

        // 3. The LSL Listener
        // LSL will change the URL from index.html#OLD_SONG to index.html#NEW_SONG
        // This function detects the change and swaps the audio instantly without reloading the page.
        function checkHash() {
            var hash = window.location.hash.substring(1); 
            if (hash && hash !== currentVid) {
                currentVid = hash;
                player.loadVideoById(currentVid); 
            }
        }
    </script>
</body>
</html>
